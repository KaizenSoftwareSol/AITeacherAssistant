<div style="font-family: -apple-system, BlinkMacOSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f8f9fa;">
  <div style="background-color: white; padding: 32px 28px; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">

    <!-- Header -->
    {EmailHeader}

    <h2 style="color: #334155; font-size: 20px; margin: 0 0 20px 0;">New Lecture Available</h2>
    <p style="color: #475569; line-height: 1.6; font-size: 15px;">Teacher <strong>[Teacher Name]</strong> has just published a new lecture in the course:</p>

    <div style="background-color: #f1f5f9; padding: 24px; border-radius: 6px; margin: 20px 0;">
      <h3 style="margin: 0 0 12px 0; color: #1e293b;">[Course Name]</h3>
      <p style="margin: 4px 0; font-weight: 600;">Lecture: [Lecture Title]</p>
      <p style="margin: 8px 0 0 0; color: #64748b;">Published on: [Date]</p>
    </div>

    <div style="text-align: center; margin: 32px 0;">
      <a href="[LECTURE_LINK]" style="display: inline-block; background-color: #3b82f6; color: white; padding: 14px 32px; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 16px;">View Lecture Now</a>
    </div>

    <!-- Footer -->
    {EmailFooter}
  </div>
</div>
