<div style="font-family: -apple-system, BlinkMacOSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f8f9fa;">
  <div style="background-color: white; padding: 32px 28px; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">

    <!-- Header -->
    {EmailHeader}

    <h2 style="color: #059669; font-size: 20px; margin: 0 0 20px 0;">New Student Enrolled</h2>
    <p style="color: #475569; line-height: 1.6; font-size: 15px;">A new student has enrolled in your course:</p>

    <div style="background-color: #f0fdf4; padding: 24px; border-radius: 6px; margin: 24px 0; border-left: 4px solid #059669;">
      <h3 style="margin: 0 0 12px 0; color: #1e293b;">[Course Name]</h3>
      <p style="margin: 8px 0; color: #475569;"><strong>Student:</strong> [Student Name]</p>
      <p style="margin: 8px 0; color: #475569;"><strong>Student ID:</strong> [Student ID]</p>
      <p style="margin: 8px 0; color: #475569;"><strong>Enrolled on:</strong> [Enrollment Date]</p>
    </div>

    <p style="color: #64748b; font-size: 14px; margin: 20px 0;">You can view all enrolled students and manage your course from the course dashboard.</p>

    <div style="text-align: center; margin: 32px 0;">
      <a href="[COURSE_LINK]" style="display: inline-block; background-color: #059669; color: white; padding: 14px 32px; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 16px;">View Course</a>
    </div>

    <!-- Footer -->
    {EmailFooter}

  </div>
</div>
